# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

# Will soon be renamed to cd_build_artifact.yml.
# Trigger logic has been spun out into the various 'ci_trigger_*.yml' workflows.

name: 'CI: Create Build Artifact'

on:
  repository_dispatch:
    types: [create-build]
      
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
  
    steps:
    - name: Extract payload inputs
      run: |
        echo "DEPLOY_ENV = ${{ github.event.client_payload.deploy_env }}" >> $GITHUB_ENV
        echo "BASE_URL = ${{ vars.BASE_URL_PREFIX }}${{ github.event.client_payload.base_url }}" >> $GITHUB_ENV
      # BASE_URL_PREFIX is purely to allow testing on forks; it should be left empty on the main branch
    
    - name: Validate payload inputs
      run: |
        if ![["$DEPLOY_ENV" = "production"] || ["$DEPLOY_ENV" = "staging"]]; then
          echo "Invalid DEPLOY_ENV value. Expected 'production' or 'staging'; recieved '$DEPLOY_ENV'. "
          exit 1
        fi

    - name: Checkout
      uses: actions/checkout@v4
      with:
       fetch-depth: 0
       
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Generate version
      id: version
      run: echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Install dependencies
      run: |
        npm ci
    # If you're here because of an error about dependencies:
    # that issue is most likely because of the `package-lock.json`.
    # Delete `node_modules` and `package-lock.json` on your
    # development environment, then run `npm i` to generate
    # a fresh lock file.
    # See also: https://github.com/npm/cli/issues/4828

    # Determine if this is a production build
    - name: Determine build type and version
      id: build-info
      run: |
        echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
        
        if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.deploy_env }}" == "production" ]]; then
          VERSION=$(date +'%Y%m%d-%H%M%S')
          echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          echo "Building for PRODUCTION environment"
        else
          echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          echo "Building for STAGING environment"
        fi

    - name: Configure baseUrl
      if: ${{ env.DEPLOY_ENV == 'staging' && env.deploy_env == 'staging-composite' }}
      run: |
        # Create a backup of the original config
        cp docusaurus.config.js docusaurus.config.js.bak
        
        # Use sed to replace the baseUrl value
        echo "Setting baseUrl to path '$BASE_URL'"
        sed -i 's|baseUrl: '\''\/local\/'\''|baseUrl: '\''$BASE_URL'\''|g' docusaurus.config.js
        sed -i 's|baseUrl: "\/local\/"|baseUrl: '\''$BASE_URL'\''|g' docusaurus.config.js
        sed -i 's|baseUrl = '\''\/local\/'\''|baseUrl = '\''$BASE_URL'\''|g' docusaurus.config.js
        sed -i 's|baseUrl = "\/local\/"|baseUrl = '\''$BASE_URL'\''|g' docusaurus.config.js
        
        # Show the changed config
        echo "Modified docusaurus.config.js:"
        cat docusaurus.config.js

    # Build the site
    - name: Build website
      run: npm run build
      env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_CIROH_GROUP_ID: ${{ secrets.ZOTERO_CIROH_GROUP_ID }}
          CAPTCHA_KEY: ${{ secrets.CAPTCHA_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          HS_CLIENT_ID: ${{ secrets.HS_CLIENT_ID }}
        
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: build-${{ env.DEPLOY_ENV }}
        #name: ${{env.GitVersion_SemVer}}
        # A file, directory or wildcard pattern that describes what to upload
        path: build/
        # The desired behavior if no files are found using the provided path.

    - name: Create release
      if: ${{ env.DEPLOY_ENV == 'production' }}
      uses: actions/create-release@v1
      id: create_release
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          tag_name: v${{env.VERSION}}
          release_name: Release v${{env.VERSION}}
          draft: false
          prerelease: false

    # Get short SHA first
    - name: Get short SHA
      id: short-sha
      run: echo "SHORT_SHA=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
    
    # Trigger CD workflow using repository dispatch          
    - name: Trigger deployment
      uses: peter-evans/repository-dispatch@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: build-completed
        client-payload: '{"short_hash": "${{ steps.short-sha.outputs.SHORT_SHA }}", "commit_hash": "${{ github.sha }}", "commit_message": ${{ toJSON(github.event.head_commit.message) }}, "branch": "${{ github.ref_name }}", "env": "${{ env.DEPLOY_ENV }}", "version": "${{ env.VERSION }}"}'
